<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/sbk-converter-favicon.png">
  <title>SBK PAL -> NTSC Time Converter</title>
  <style>
    body {
      background-color: #2F4F4F;
      color: #F0F8FF;
      font-family: Verdana, Geneva, sans-serif;
      line-height: 1.6;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      color: #FFFFFF;
      font-weight: normal;
      font-size: 1.4em;
      border-bottom: 1px solid #4682B4;
      padding-bottom: 10px;
    }

    .tool-desc {
      font-size: 0.9em;
      color: #A9A9A9;
      margin-bottom: 20px;
    }

    .input-box {
      background: #3e5f5f;
      padding: 15px;
      border: 1px solid #5f9ea0;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.75em;
      margin-bottom: 8px;
      color: #A9A9A9;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .time-inputs {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
    }

    input {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.1em;
      padding: 5px;
      background: #2F4F4F;
      color: white;
      border: 1px solid #5f9ea0;
      width: 60px;
      text-align: center;
      /* hide spinners */
      -moz-appearance: textfield;
    }
    input::-webkit-inner-spin-button,
    input::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .time-inputs input[id="ms"] { width: 100px; }

    .result-display {
      padding: 25px;
      border: 1px solid pink;
      text-align: center;
    }

    #result {
      font-family: 'Courier New', Courier, monospace;
      font-size: 2.4em;
      color: pink;
      display: block;
    }

    a {
      color: pink;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 40px;
      font-size: 0.75em;
      text-align: center;
      color: #A9A9A9;
      border-top: 1px solid #4682B4;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <p><a href="index.html">← go back</a></p>

  <h1>Snowboard Kids (N64) Speedrun Conversion Tool</h1>
  <p class="tool-desc">Enter your PAL time to see the equivalent NTSC time.</p>

  <div class="input-box">
    <label>PAL Time (h:m:s.ms)</label>
    <div class="time-inputs">
      <input type="number" id="h" placeholder="0" oninput="calc()"> :
      <input type="number" id="m" placeholder="00" oninput="calc()"> :
      <input type="number" id="s" placeholder="00" oninput="calc()"> .
      <input type="number" id="ms" placeholder="000" oninput="calc()">
    </div>
  </div>

  <div class="result-display">
    <label>NTSC Equivalent</label>
    <span id="result">00:00:00.000</span>
  </div>

  <div class="footer">
    Calculations for these values are provided in the <br>
    <a href="https://github.com/meauxdal/N64-Refresh-Rate-Reference">N64 Refresh Rate Reference</a>
  </div>

<script>
const rN = 15625n * 37609n;
const rD = 313n * 2250000n;
const ratio = Number(rN) / Number(rD);

function pad(n, z) { return n.toString().padStart(z, '0'); }

function calc() {
  const h  = parseInt(document.getElementById('h').value)  || 0;
  const m  = parseInt(document.getElementById('m').value)  || 0;
  const s  = parseInt(document.getElementById('s').value)  || 0;
  const ms = parseInt(document.getElementById('ms').value) || 0;

  const totalMs = (h * 3600000) + (m * 60000) + (s * 1000) + ms;
  if (totalMs === 0) {
    document.getElementById('result').innerText = "00:00:00.000";
    return;
  }

  const ntscTotal = totalMs * ratio;

  const nh  = Math.floor(ntscTotal / 3600000);
  const nm  = Math.floor((ntscTotal % 3600000) / 60000);
  const ns  = Math.floor((ntscTotal % 60000) / 1000);
  const nms = Math.floor(ntscTotal % 1000);

  document.getElementById('result').innerText =
    `${pad(nh,2)}:${pad(nm,2)}:${pad(ns,2)}.${pad(nms,3)}`;
}
</script>

</body>
</html>
